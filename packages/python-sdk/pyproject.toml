[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tethral-acr"
version = "0.1.0"
description = "Python SDK for the ACR (Agent Composition Records) network"
requires-python = ">=3.10"
dependencies = ["httpx>=0.27.0"]

[project.urls]
Homepage = "https://acr.tethral.ai"
Repository = "https://github.com/tethral/acr"
