[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tethral-acr"
version = "0.3.0"
description = "Python SDK for the ACR (Agent Composition Records) network"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["httpx>=0.27.0"]
keywords = ["acr", "agent", "composition", "registry", "tethral", "friction"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://acr.nfkey.ai"
Repository = "https://github.com/Tethral-Inc/AgentRegistry"
Documentation = "https://acr.nfkey.ai"
Issues = "https://github.com/Tethral-Inc/AgentRegistry/issues"

[tool.setuptools.packages.find]
include = ["tethral_acr*"]
