name: Nightly
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  # Terraform drift detection. Clean-skips when infra secrets aren't set;
  # fires a Slack alert only if both drift is detected AND the webhook is configured.
  drift-check:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cockroach_connection_string: ${{ secrets.COCKROACH_CONNECTION_STRING_STAGING }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check terraform secrets configured
        id: check
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$TF_VAR_cloudflare_account_id" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Terraform secrets not configured — skipping drift check."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.check.outputs.configured == 'true'
      - name: Detect drift and alert
        if: steps.check.outputs.configured == 'true'
        working-directory: terraform/environments/staging
        run: |
          terraform init
          set +e
          terraform plan -detailed-exitcode -no-color
          code=$?
          set -e
          if [ $code -eq 2 ]; then
            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
                -H 'Content-type: application/json' \
                -d '{"text":"ACR infrastructure drift detected. Check GitHub Actions."}'
            else
              echo "::warning::Drift detected but SLACK_WEBHOOK_URL unset — no alert sent."
            fi
            exit 1
          elif [ $code -ne 0 ]; then
            exit $code
          fi

  # Dependency audit. GitHub's Dependabot also watches the lockfile continuously,
  # so this is a belt-and-suspenders check. Alert only if webhook is configured.
  dependency-audit:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: |
          set +e
          pnpm audit --audit-level=high
          code=$?
          set -e
          if [ $code -ne 0 ]; then
            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
                -H 'Content-type: application/json' \
                -d '{"text":"ACR dependency audit found high-severity vulnerabilities."}'
            else
              echo "::warning::Audit found vulnerabilities but SLACK_WEBHOOK_URL unset — no alert sent."
            fi
            exit $code
          fi
