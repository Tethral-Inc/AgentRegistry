name: CI
on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Guard against the 2.8/2.9/2.10 skew pattern: server.json version
      # fell behind mcp-server/package.json, and publish-mcp silently
      # skipped the registry sync instead of failing. Catching drift here
      # (in PR CI) means it's fixed before merge, not discovered when
      # MCP registry is stuck at an old version.
      - name: Check MCP version consistency
        run: |
          PKG=$(node -p "require('./packages/mcp-server/package.json').version")
          SERVER=$(node -p "require('./server.json').version")
          SERVER_PKG=$(node -p "require('./server.json').packages[0].version")
          if [ "$PKG" != "$SERVER" ] || [ "$PKG" != "$SERVER_PKG" ]; then
            echo "::error::Version drift — mcp-server/package.json=$PKG, server.json root=$SERVER, server.json packages[0]=$SERVER_PKG. Update server.json to match."
            exit 1
          fi
          echo "✓ MCP versions agree: $PKG"
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  # Terraform plan on PRs for drift visibility. Clean-skips when secrets
  # aren't configured (no silent continue-on-error masking real failures).
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cockroach_connection_string: ${{ secrets.COCKROACH_CONNECTION_STRING }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check terraform secrets configured
        id: check
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$TF_VAR_cloudflare_account_id" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Terraform secrets not configured — skipping plan."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.check.outputs.configured == 'true'
      - name: Terraform plan
        if: steps.check.outputs.configured == 'true'
        working-directory: terraform/environments/staging
        run: terraform init && terraform plan -no-color
