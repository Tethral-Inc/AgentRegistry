name: Publish Packages
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options: [all, mcp-server, ts-sdk, python-sdk]

# Only allow workflow_dispatch from master
# All publish jobs require manual approval via the npm-publish environment.
# Create this environment in Settings → Environments and add required reviewers.

permissions:
  contents: read
  id-token: write

jobs:
  publish-mcp:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp-server'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - working-directory: packages/mcp-server
        run: pnpm build && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'ts-sdk'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - working-directory: packages/ts-sdk
        run: pnpm build && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'python-sdk'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: '3.12' }
      - run: pip install build twine
      - working-directory: packages/python-sdk
        run: python -m build && twine check dist/* && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
