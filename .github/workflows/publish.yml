name: Publish Packages
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options: [all, mcp-server, ts-sdk, python-sdk]

# Only allow workflow_dispatch from master
# All publish jobs require manual approval via the npm-publish environment.
# Create this environment in Settings → Environments and add required reviewers.

permissions:
  contents: read
  id-token: write

jobs:
  publish-mcp:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp-server'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      # Fail-hard if server.json fell behind package.json. Previously this
      # was caught only by a soft warning in the registry-sync step, which
      # meant the 2.8/2.9/2.10 releases all silently skipped the MCP
      # registry. Guarding BEFORE npm publish prevents shipping a version
      # to npm that we can't sync to the MCP registry.
      - name: Verify MCP version consistency
        run: |
          PKG=$(node -p "require('./packages/mcp-server/package.json').version")
          SERVER=$(node -p "require('./server.json').version")
          SERVER_PKG=$(node -p "require('./server.json').packages[0].version")
          if [ "$PKG" != "$SERVER" ] || [ "$PKG" != "$SERVER_PKG" ]; then
            echo "::error::Version drift blocks publish — mcp-server/package.json=$PKG, server.json root=$SERVER, server.json packages[0]=$SERVER_PKG."
            exit 1
          fi
      - name: Publish if version is new
        working-directory: packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "⏭️  $PKG@$VERSION already published, skipping."
          else
            pnpm build && npm publish --provenance --access public
          fi
      - name: Sync MCP registry listing
        # Keeps registry.modelcontextprotocol.io in sync with npm. Auths via
        # GitHub OIDC (no token needed) and skips cleanly if the registry
        # is already at the current version. Version consistency between
        # package.json and server.json is enforced upstream by the
        # "Verify MCP version consistency" step.
        run: |
          PKG_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          REGISTRY_VERSION=$(curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.Tethral-Inc/acr" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); s=d['servers']; print(s[0]['server']['version'] if s else 'none')" || echo "none")
          if [ "$REGISTRY_VERSION" = "$PKG_VERSION" ]; then
            echo "⏭️  MCP registry already at $PKG_VERSION, skipping."
            exit 0
          fi
          curl -fsSL -o mcp-publisher.tar.gz https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  publish-sdk:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'ts-sdk'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install --frozen-lockfile
      - name: Publish if version is new
        working-directory: packages/ts-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG@$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "⏭️  $PKG@$VERSION already published, skipping."
          else
            pnpm build && npm publish --provenance --access public
          fi

  publish-python:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'python-sdk'))
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: '3.12' }
      - run: pip install build twine
      - name: Publish if version is new
        working-directory: packages/python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m build && twine check dist/* && twine upload --skip-existing dist/*
