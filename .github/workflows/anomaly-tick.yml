name: Anomaly tick

# Every 15 min: hit the ingestion API's detection endpoint. Every top-of-hour:
# also recompute per-agent baselines. Both are idempotent no-ops if no data.
# Clean-skips when CRON_SECRET or INGESTION_API_URL aren't set, so the
# workflow is safe to merge before the secrets land.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      INGESTION_API_URL: ${{ secrets.INGESTION_API_URL }}
    steps:
      - name: Check secrets configured
        id: check
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$INGESTION_API_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CRON_SECRET or INGESTION_API_URL not set — skipping anomaly tick."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Recompute baselines (top of hour only)
        if: steps.check.outputs.configured == 'true'
        run: |
          minute=$(date -u +%M)
          if [ "$minute" -lt 15 ]; then
            curl -fsS -H "Authorization: Bearer $CRON_SECRET" \
              "$INGESTION_API_URL/api/cron/agent-baseline-compute"
          else
            echo "Skipping baseline compute (minute=$minute, only runs 00-14)"
          fi
      - name: Detect anomalies
        if: steps.check.outputs.configured == 'true'
        run: |
          curl -fsS -H "Authorization: Bearer $CRON_SECRET" \
            "$INGESTION_API_URL/api/cron/agent-anomaly-detect"
