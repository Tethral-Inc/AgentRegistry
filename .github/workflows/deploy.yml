name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: 'Run terraform apply (infrastructure changes)'
        type: boolean
        default: false
      run_migrations:
        description: 'Run database migrations up'
        type: boolean
        default: false

jobs:
  # Terraform: plan on every push (drift detection, no side effects),
  # apply only on manual workflow_dispatch with explicit input.
  infrastructure:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cockroach_connection_string: ${{ secrets.COCKROACH_CONNECTION_STRING_STAGING }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Check terraform secrets configured
        id: check
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$TF_VAR_cloudflare_account_id" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Terraform secrets not configured — skipping. Set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, COCKROACH_CONNECTION_STRING_STAGING, SLACK_WEBHOOK_URL to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.check.outputs.configured == 'true'
      - name: Terraform init
        if: steps.check.outputs.configured == 'true'
        working-directory: terraform/environments/staging
        run: terraform init
      - name: Terraform plan
        if: steps.check.outputs.configured == 'true' && github.event_name == 'push'
        working-directory: terraform/environments/staging
        run: terraform plan -no-color
      - name: Terraform apply
        if: steps.check.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && inputs.terraform_apply
        working-directory: terraform/environments/staging
        run: terraform apply -auto-approve

  # Migrations: manual only via workflow_dispatch with explicit input.
  # Applying DDL on every push is too aggressive — you want a human in the loop.
  migrations:
    if: github.event_name == 'workflow_dispatch' && inputs.run_migrations
    runs-on: ubuntu-latest
    env:
      COCKROACH_URL: ${{ secrets.COCKROACH_CONNECTION_STRING_STAGING }}
    steps:
      - uses: actions/checkout@v4
      - name: Check cockroach secret configured
        run: |
          if [ -z "$COCKROACH_URL" ]; then
            echo "::error::COCKROACH_CONNECTION_STRING_STAGING not set — cannot run migrations"
            exit 1
          fi
      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/
      - name: Run migrations
        run: migrate -database "$COCKROACH_URL" -path migrations up

  # Services: auto-deploy app code on push. Does not depend on infra/migrations —
  # those are managed separately. App code is safe to ship on every push.
  services:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Deploy resolver API to Cloudflare Workers
      - name: Check Cloudflare token configured
        id: cf_check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping resolver-api deploy"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy resolver API to Cloudflare Workers
        if: steps.cf_check.outputs.configured == 'true'
        working-directory: packages/resolver-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
      # Deploy ingestion API to Vercel (production) — prebuilt to avoid remote OOM on monorepo resolution
      - name: Pull Vercel environment
        working-directory: packages/ingestion-api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build with Vercel
        working-directory: packages/ingestion-api
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt to Vercel
        working-directory: packages/ingestion-api
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
